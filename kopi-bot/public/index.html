<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kopi Corner Chat</title>
<style>
	:root {
		color-scheme: light;
	}
	* { box-sizing: border-box; }
	body {
		margin: 0;
		font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
		background: #f4ede4;
		color: #3a2a1a;
		display: flex;
		justify-content: center;
		padding: 2rem 1rem;
	}
	main {
		width: 100%;
		max-width: 480px;
		background: #fffaf3;
		border-radius: 12px;
		box-shadow: 0 2px 12px rgba(58, 42, 26, 0.12);
		display: flex;
		flex-direction: column;
		height: 80vh;
		overflow: hidden;
	}
	header {
		padding: 1rem 1.25rem;
		border-bottom: 1px solid #e8dcc8;
		text-align: center;
	}
	header h1 {
		margin: 0;
		font-size: 1.2rem;
	}
	header p {
		margin: 0.15rem 0 0;
		font-size: 0.8rem;
		color: #8a7256;
	}
	#messages {
		flex: 1;
		overflow-y: auto;
		padding: 1rem 1.25rem;
		display: flex;
		flex-direction: column;
		gap: 0.6rem;
	}
	.msg {
		max-width: 85%;
		padding: 0.55rem 0.8rem;
		border-radius: 10px;
		font-size: 0.92rem;
		line-height: 1.4;
		white-space: pre-wrap;
	}
	.msg.user {
		align-self: flex-end;
		background: #6f4a2c;
		color: #fff;
	}
	.msg.bot {
		align-self: flex-start;
		background: #efe3d2;
		color: #3a2a1a;
	}
	form {
		display: flex;
		gap: 0.5rem;
		padding: 0.75rem;
		border-top: 1px solid #e8dcc8;
	}
	input[type="text"] {
		flex: 1;
		padding: 0.6rem 0.75rem;
		border: 1px solid #d9c9ae;
		border-radius: 8px;
		font-size: 0.92rem;
	}
	button {
		padding: 0.6rem 1rem;
		border: none;
		border-radius: 8px;
		background: #6f4a2c;
		color: #fff;
		font-size: 0.92rem;
		cursor: pointer;
	}
	button:disabled {
		opacity: 0.6;
		cursor: default;
	}
</style>
</head>
<body>
	<main>
		<header>
			<h1>☕ Kopi Corner</h1>
			<p>Ask about our menu, hours, or location</p>
		</header>
		<div id="messages"></div>
		<form id="chat-form">
			<input type="text" id="input" autocomplete="off" placeholder="Ask a question…" />
			<button type="submit" id="send">Send</button>
		</form>
	</main>

	<script>
		const messagesEl = document.getElementById('messages');
		const form = document.getElementById('chat-form');
		const input = document.getElementById('input');
		const sendBtn = document.getElementById('send');

		function addMessage(text, role) {
			const div = document.createElement('div');
			div.className = 'msg ' + role;
			div.textContent = text;
			messagesEl.appendChild(div);
			messagesEl.scrollTop = messagesEl.scrollHeight;
		}

		addMessage("Hi! Ask me about Kopi Corner's menu, hours, or location.", 'bot');

		form.addEventListener('submit', async (e) => {
			e.preventDefault();
			const message = input.value.trim();
			if (!message) return;
			addMessage(message, 'user');
			input.value = '';
			sendBtn.disabled = true;
			try {
				const res = await fetch('/api/chat', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ message })
				});
				const data = await res.json();
				addMessage(data.reply || data.error || 'Something went wrong.', 'bot');
			} catch {
				addMessage('Could not reach the server.', 'bot');
			} finally {
				sendBtn.disabled = false;
				input.focus();
			}
		});
	</script>
</body>
</html>
